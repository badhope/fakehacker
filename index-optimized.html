<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>效果展示平台 - Effect Showcase Platform</title>
    <style>
        /* ========================================
           CSS 变量系统 - 统一设计语言
           ======================================== */
        :root {
            /* 主色调 */
            --primary-cyan: #00ffff;
            --primary-green: #00ff00;
            --primary-magenta: #ff00ff;
            
            /* 辅助色 */
            --accent-orange: #ff8800;
            --accent-yellow: #ffff00;
            --accent-red: #ff4444;
            
            /* 背景色 */
            --bg-dark: #000000;
            --bg-darker: #050510;
            --bg-card: rgba(10, 10, 30, 0.8);
            --bg-card-hover: rgba(20, 20, 50, 0.9);
            
            /* 文字色 */
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #888888;
            
            /* 边框 */
            --border-primary: 2px solid var(--primary-cyan);
            --border-secondary: 1px solid rgba(0, 255, 255, 0.3);
            
            /* 阴影 */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 255, 255, 0.2);
            --shadow-lg: 0 16px 48px rgba(0, 255, 255, 0.3);
            --shadow-glow: 0 0 30px rgba(0, 255, 255, 0.5);
            
            /* 间距 */
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            
            /* 圆角 */
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            
            /* 过渡 */
            --transition-fast: 0.15s ease;
            --transition-base: 0.3s ease;
            --transition-slow: 0.5s ease;
            
            /* 字体 */
            --font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            --font-mono: 'Courier New', monospace;
            
            /* 字体大小 */
            --font-xs: 12px;
            --font-sm: 14px;
            --font-base: 16px;
            --font-lg: 18px;
            --font-xl: 24px;
            --font-2xl: 32px;
            --font-3xl: 48px;
        }

        /* ========================================
           基础样式重置
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary-cyan), var(--primary-green));
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--primary-green), var(--primary-cyan));
        }

        /* ========================================
           动态背景层
           ======================================== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(180deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
        }

        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: grid-move 30s linear infinite;
            opacity: 0.6;
        }

        @keyframes grid-move {
            0% { transform: perspective(1000px) rotateX(60deg) translateY(0) scale(0.8); }
            100% { transform: perspective(1000px) rotateX(60deg) translateY(60px) scale(0.8); }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.4), 
                rgba(0, 255, 255, 0.6), 
                rgba(0, 255, 255, 0.4), 
                transparent);
            animation: scan 4s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        @keyframes scan {
            0%, 100% { top: -5%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }

        /* 浮动粒子 */
        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(0, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 100px 100px;
            animation: particles-float 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes particles-float {
            0% { transform: translateY(0) translateX(0); }
            100% { transform: translateY(-100px) translateX(50px); }
        }

        /* ========================================
           头部区域 - 增强视觉层次
           ======================================== */
        .header {
            background: linear-gradient(180deg, 
                rgba(0, 255, 255, 0.15) 0%, 
                rgba(0, 255, 255, 0.05) 50%,
                transparent 100%);
            border-bottom: 2px solid var(--primary-cyan);
            padding: var(--spacing-xl) var(--spacing-lg);
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.2), 
                transparent);
            animation: header-shine 5s ease-in-out infinite;
        }

        @keyframes header-shine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        .header h1 {
            font-size: clamp(32px, 5vw, var(--font-3xl));
            color: var(--primary-cyan);
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.8),
                         0 0 60px rgba(0, 255, 255, 0.4),
                         0 0 90px rgba(0, 255, 255, 0.2);
            letter-spacing: 8px;
            animation: glow-pulse 3s ease-in-out infinite alternate;
            position: relative;
            z-index: 1;
            margin-bottom: var(--spacing-sm);
        }

        @keyframes glow-pulse {
            from { 
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.6),
                             0 0 40px rgba(0, 255, 255, 0.3);
            }
            to { 
                text-shadow: 0 0 40px rgba(0, 255, 255, 1),
                             0 0 80px rgba(0, 255, 255, 0.6),
                             0 0 120px rgba(0, 255, 255, 0.3);
            }
        }

        .header p {
            color: var(--primary-green);
            font-size: clamp(14px, 2vw, var(--font-lg));
            margin-top: var(--spacing-sm);
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        /* ========================================
           主容器 - 优化布局
           ======================================== */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        /* ========================================
           统计栏 - 增强视觉层次
           ======================================== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: linear-gradient(135deg, 
                rgba(0, 255, 255, 0.12) 0%, 
                rgba(0, 255, 255, 0.06) 100%);
            border: var(--border-primary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-base);
            backdrop-filter: blur(10px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent, 
                rgba(0, 255, 255, 0.15), 
                transparent);
            transform: rotate(45deg);
            animation: shine-sweep 4s ease-in-out infinite;
        }

        @keyframes shine-sweep {
            0%, 100% { transform: translateX(-100%) translateY(-100%) rotate(45deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); opacity: 0; }
        }

        .stat-card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(135deg, 
                rgba(0, 255, 255, 0.2) 0%, 
                rgba(0, 255, 255, 0.1) 100%);
        }

        .stat-number {
            font-size: clamp(48px, 4vw, 64px);
            color: var(--primary-cyan);
            font-weight: 700;
            display: block;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            position: relative;
            z-index: 1;
            font-family: var(--font-mono);
        }

        .stat-label {
            color: var(--primary-green);
            font-size: clamp(12px, 1.5vw, var(--font-sm));
            margin-top: var(--spacing-xs);
            display: block;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        /* ========================================
           分区样式 - 统一设计
           ======================================== */
        .control-section,
        .combo-section {
            background: var(--bg-card);
            border: var(--border-primary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
            transition: all var(--transition-base);
            backdrop-filter: blur(10px);
        }

        .control-section:hover,
        .combo-section:hover {
            box-shadow: var(--shadow-md);
            border-color: rgba(0, 255, 255, 0.8);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-lg);
            padding-bottom: var(--spacing-sm);
            border-bottom: var(--border-secondary);
        }

        .control-title,
        .combo-title {
            color: var(--primary-cyan);
            font-size: clamp(20px, 3vw, var(--font-xl));
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .section-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn-small {
            padding: 8px 16px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: var(--font-sm);
            transition: all var(--transition-fast);
        }

        .btn-small:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* ========================================
           按钮网格 - 优化布局
           ======================================== */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: var(--spacing-md);
        }

        .effect-btn {
            background: linear-gradient(135deg, 
                rgba(0, 255, 255, 0.15) 0%, 
                rgba(0, 255, 255, 0.08) 100%);
            border: var(--border-primary);
            color: var(--primary-cyan);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
            font-size: var(--font-sm);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--spacing-sm);
            position: relative;
            overflow: hidden;
            min-height: 120px;
            backdrop-filter: blur(5px);
        }

        .effect-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 255, 255, 0.3), 
                transparent);
            transition: left var(--transition-slow);
        }

        .effect-btn:hover::before {
            left: 100%;
        }

        .effect-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: var(--shadow-glow);
            background: linear-gradient(135deg, 
                rgba(0, 255, 255, 0.25) 0%, 
                rgba(0, 255, 255, 0.15) 100%);
            border-color: var(--primary-cyan);
        }

        .effect-btn:active {
            transform: scale(0.98);
        }

        .effect-btn.playing {
            animation: btn-playing 1.5s ease-in-out infinite;
            border-color: var(--primary-green);
            background: linear-gradient(135deg, 
                rgba(0, 255, 0, 0.2) 0%, 
                rgba(0, 255, 0, 0.1) 100%);
        }

        @keyframes btn-playing {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 0, 0.8); }
        }

        .btn-icon {
            font-size: 32px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
        }

        .btn-label {
            text-align: center;
            line-height: 1.3;
        }

        /* ========================================
           组合卡片 - 增强视觉层次
           ======================================== */
        .combo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--spacing-md);
        }

        .combo-card {
            background: linear-gradient(135deg, 
                rgba(255, 0, 255, 0.15) 0%, 
                rgba(255, 0, 255, 0.08) 100%);
            border: 2px solid var(--primary-magenta);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .combo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, 
                var(--primary-magenta), 
                var(--primary-cyan), 
                var(--primary-green));
        }

        .combo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(255, 0, 255, 0.5);
            border-color: rgba(255, 0, 255, 0.8);
        }

        .combo-card h3 {
            color: var(--primary-magenta);
            font-size: clamp(18px, 2.5vw, var(--font-lg));
            margin-bottom: var(--spacing-sm);
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .combo-card p {
            color: var(--text-secondary);
            font-size: var(--font-sm);
            line-height: 1.6;
            margin-bottom: var(--spacing-md);
        }

        .combo-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: var(--font-xs);
            padding-top: var(--spacing-sm);
            border-top: var(--border-secondary);
        }

        .combo-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ========================================
           代码输入区 - 优化设计
           ======================================== */
        .code-input-section {
            position: fixed;
            bottom: var(--spacing-lg);
            right: var(--spacing-lg);
            width: min(600px, calc(100vw - 40px));
            background: linear-gradient(135deg, 
                rgba(10, 10, 30, 0.98) 0%, 
                rgba(5, 5, 20, 0.98) 100%);
            border: 2px solid var(--primary-green);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3);
            z-index: 9500;
            transition: all var(--transition-base);
            backdrop-filter: blur(20px);
        }

        .code-input-section:hover {
            box-shadow: 0 0 60px rgba(0, 255, 0, 0.5);
            border-color: rgba(0, 255, 0, 0.8);
        }

        .code-input-title {
            color: var(--primary-green);
            font-size: var(--font-lg);
            margin-bottom: var(--spacing-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }

        .code-input-hint {
            font-size: var(--font-xs);
            color: var(--text-muted);
            font-weight: 400;
        }

        .code-editor {
            width: 100%;
            min-height: 180px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary-green);
            border-radius: var(--radius-sm);
            color: var(--primary-green);
            font-family: var(--font-mono);
            font-size: var(--font-sm);
            padding: var(--spacing-sm);
            resize: vertical;
            outline: none;
            line-height: 1.6;
            transition: all var(--transition-fast);
        }

        .code-editor:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            background: rgba(0, 0, 0, 0.9);
        }

        .code-editor::placeholder {
            color: rgba(0, 255, 0, 0.3);
        }

        .code-actions {
            display: flex;
            gap: var(--spacing-sm);
            justify-content: flex-end;
            margin-top: var(--spacing-sm);
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 700;
            font-size: var(--font-sm);
            transition: all var(--transition-fast);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-clear {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
        }

        .btn-clear:hover {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        .btn-execute {
            background: linear-gradient(45deg, var(--primary-green), var(--primary-cyan));
            color: var(--bg-dark);
            border: 1px solid var(--primary-green);
        }

        .btn-execute:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            filter: brightness(1.2);
        }

        /* ========================================
           页脚 - 统一风格
           ======================================== */
        .footer {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-lg);
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(0, 0, 0, 0.9) 100%);
            border-top: 2px solid var(--primary-cyan);
            margin-top: var(--spacing-xl);
        }

        .footer p {
            color: var(--text-muted);
            font-size: var(--font-sm);
            margin-bottom: var(--spacing-xs);
        }

        .footer-highlight {
            color: var(--primary-cyan);
            font-weight: 600;
        }

        /* ========================================
           响应式优化
           ======================================== */
        @media (max-width: 1024px) {
            .main-container {
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .button-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        @media (max-width: 768px) {
            :root {
                --spacing-xl: 32px;
                --spacing-lg: 24px;
                --spacing-md: 16px;
            }

            .header {
                padding: var(--spacing-lg) var(--spacing-md);
            }

            .header h1 {
                letter-spacing: 4px;
            }

            .stats-bar {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }

            .stat-card {
                padding: var(--spacing-md);
            }

            .button-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: var(--spacing-sm);
            }

            .combo-grid {
                grid-template-columns: 1fr;
            }

            .code-input-section {
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 28px;
                letter-spacing: 2px;
            }

            .header p {
                font-size: 14px;
            }

            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-number {
                font-size: 40px;
            }

            .control-title,
            .combo-title {
                font-size: 18px;
            }
        }

        /* ========================================
           加载状态与动画
           ======================================== */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fade-in 0.6s ease-out;
        }

        /* 加载指示器 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 255, 255, 0.3);
            border-top-color: var(--primary-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========================================
           可访问性优化
           ======================================== */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 焦点样式 */
        button:focus,
        textarea:focus {
            outline: 2px solid var(--primary-cyan);
            outline-offset: 2px;
        }

        /* 高对比度模式 */
        @media (prefers-contrast: high) {
            :root {
                --primary-cyan: #00ffff;
                --primary-green: #00ff00;
                --bg-card: rgba(0, 0, 0, 0.95);
            }

            .effect-btn,
            .stat-card,
            .combo-card {
                border-width: 3px;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="bg-animation">
        <div class="grid-lines"></div>
        <div class="scan-line"></div>
        <div class="floating-particles"></div>
    </div>

    <!-- 效果 Canvas -->
    <canvas id="effect-canvas"></canvas>

    <!-- 头部 -->
    <header class="header fade-in">
        <h1>⚡ EFFECT SHOWCASE ⚡</h1>
        <p>交互式视觉效果展示平台</p>
    </header>

    <!-- 主容器 -->
    <main class="main-container">
        <!-- 统计栏 -->
        <section class="stats-bar fade-in">
            <div class="stat-card">
                <span class="stat-number" id="total-effects">0</span>
                <span class="stat-label">总效果数</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="total-combos">0</span>
                <span class="stat-label">效果组合</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="active-effects">0</span>
                <span class="stat-label">活跃效果</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="fps-counter">60</span>
                <span class="stat-label">FPS</span>
            </div>
        </section>

        <!-- 单个效果区 -->
        <section class="control-section fade-in">
            <div class="section-header">
                <h2 class="control-title">🎨 单个效果</h2>
                <div class="section-actions">
                    <button class="btn-small" onclick="stopAllEffects()">⏹ 全部停止</button>
                </div>
            </div>
            <div class="button-grid" id="effects-grid">
                <!-- 动态生成 -->
            </div>
        </section>

        <!-- 效果组合区 -->
        <section class="combo-section fade-in">
            <div class="section-header">
                <h2 class="combo-title">🔥 效果组合</h2>
                <div class="section-actions">
                    <button class="btn-small" onclick="stopAllCombos()">⏹ 停止组合</button>
                </div>
            </div>
            <div class="combo-grid" id="combos-grid">
                <!-- 动态生成 -->
            </div>
        </section>
    </main>

    <!-- 代码输入区 -->
    <aside class="code-input-section fade-in" id="code-input">
        <div class="code-input-title">
            <span>💻 代码控制台</span>
            <span class="code-input-hint">Ctrl+Enter 执行</span>
        </div>
        <textarea 
            class="code-editor" 
            id="code-editor" 
            placeholder="// 输入代码指令&#10;// 示例：&#10;// play('matrix_rain')&#10;// combo('cyber_attack')&#10;// stopAll()"></textarea>
        <div class="code-actions">
            <button class="action-btn btn-clear" onclick="clearCode()">清空</button>
            <button class="action-btn btn-execute" onclick="executeCode()">▶ 执行</button>
        </div>
    </aside>

    <!-- 页脚 -->
    <footer class="footer">
        <p>Effect Showcase Platform <span class="footer-highlight">v2.0</span> | Powered by ShowcaseEngine</p>
        <p style="font-size: 12px; margin-top: 8px;">按 <span class="footer-highlight">ESC</span> 停止所有效果</p>
    </footer>

    <!-- 脚本加载 -->
    <script src="js/core/EventBus.js"></script>
    <script src="js/showcase/ShowcaseEngine.js"></script>
    <script src="js/showcase/EffectRegistry.js"></script>
    <script src="js/showcase/ComboGenerator.js"></script>
    <script src="js/showcase/ButtonSystem.js"></script>
    <script src="js/showcase/CodeInput.js"></script>
    <script src="js/showcase/ShowcaseApp.js"></script>

    <script>
        // 全局应用实例
        let app = null;
        let comboGenerator = null;
        let buttonSystem = null;

        // 初始化应用
        async function initApp() {
            console.log('🚀 初始化展示平台...');

            try {
                // 初始化展示引擎
                const engine = new ShowcaseEngine();
                await engine.init();
                window.showcaseEngine = engine;

                // 初始化效果注册表
                const registry = new EffectRegistry(engine);
                registry.registerAllEffects();

                // 初始化组合生成器
                comboGenerator = new ComboGenerator();
                comboGenerator.init(engine);
                window.comboGenerator = comboGenerator;

                // 初始化按钮系统
                buttonSystem = new ButtonSystem();
                await buttonSystem.init(document.getElementById('effects-grid'));
                registerEffectButtons();

                // 渲染组合卡片
                renderComboCards();

                // 更新统计
                updateStats();
                setInterval(updateStats, 1000);

                // 绑定全局事件
                bindGlobalEvents();

                app = { engine, registry, comboGenerator, buttonSystem };
                window.app = app;

                console.log('✅ 展示平台初始化完成');
            } catch (error) {
                console.error('❌ 初始化失败:', error);
                alert('初始化失败：' + error.message);
            }
        }

        // 注册效果按钮
        function registerEffectButtons() {
            const effects = showcaseEngine.getAllEffects();
            const icons = {
                matrix: '🌧',
                network: '🕸',
                particle: '💥',
                glitch: '⚡',
                overlay: '📺',
                flash: '✨',
                text: '📝',
                code: '💻',
                wave: '🌊',
                pulse: '💓',
                ripple: '💧',
                distortion: '🌀'
            };

            for (const effect of effects) {
                const icon = icons[effect.category] || '⚡';
                buttonSystem.addButton(effect.id, {
                    label: effect.name,
                    icon: icon,
                    color: getCategoryColor(effect.category),
                    group: effect.category,
                    effects: [{ id: effect.id, params: effect.defaultParams }],
                    description: effect.description
                });
            }
        }

        // 获取分类颜色
        function getCategoryColor(category) {
            const colors = {
                matrix: '#00ff00',
                network: '#00ffff',
                particle: '#ff8800',
                glitch: '#ff00ff',
                overlay: '#ffffff',
                flash: '#ffff00',
                text: '#0088ff',
                code: '#00ff88',
                wave: '#ff0088',
                pulse: '#ff0055',
                ripple: '#00ffff',
                distortion: '#aa00ff'
            };
            return colors[category] || '#00ffff';
        }

        // 渲染组合卡片
        function renderComboCards() {
            const grid = document.getElementById('combos-grid');
            const combos = comboGenerator.getAllCombos();

            grid.innerHTML = '';

            for (const combo of combos) {
                const card = document.createElement('div');
                card.className = 'combo-card fade-in';
                card.onclick = () => playCombo(combo.id);

                card.innerHTML = `
                    <h3>${combo.name}</h3>
                    <p>${combo.description}</p>
                    <div class="combo-meta">
                        <span>⏱ ${(combo.duration / 1000).toFixed(1)}s</span>
                        <span>🔢 ${combo.steps.length} 步骤</span>
                        <span>▶ 播放</span>
                    </div>
                `;

                grid.appendChild(card);
            }
        }

        // 更新统计
        function updateStats() {
            if (!showcaseEngine) return;

            const stats = showcaseEngine.getStats();
            const comboStats = comboGenerator ? comboGenerator.getStats() : { totalCombos: 0 };

            document.getElementById('total-effects').textContent = stats.totalEffects;
            document.getElementById('total-combos').textContent = comboStats.totalCombos;
            document.getElementById('active-effects').textContent = stats.activeEffects;
        }

        // 播放效果
        async function playEffect(effectId) {
            try {
                await showcaseEngine.playEffect(effectId);
                highlightButton(effectId);
            } catch (error) {
                console.error('播放失败:', error);
                alert(`播放效果失败：${error.message}`);
            }
        }

        // 高亮播放中的按钮
        function highlightButton(effectId) {
            const btn = document.querySelector(`[data-id="${effectId}"]`);
            if (btn) {
                btn.classList.add('playing');
                setTimeout(() => btn.classList.remove('playing'), 3000);
            }
        }

        // 播放组合
        async function playCombo(comboId) {
            try {
                await comboGenerator.play(comboId);
            } catch (error) {
                console.error('播放组合失败:', error);
                alert(`播放组合失败：${error.message}`);
            }
        }

        // 清空代码
        function clearCode() {
            document.getElementById('code-editor').value = '';
            document.getElementById('code-editor').focus();
        }

        // 执行代码
        async function executeCode() {
            const code = document.getElementById('code-editor').value.trim();
            if (!code) return;

            try {
                const lines = code.split('\n').filter(line => line.trim() && !line.trim().startsWith('//'));
                
                for (const line of lines) {
                    await executeLine(line.trim());
                }
            } catch (error) {
                console.error('执行失败:', error);
                alert(`执行失败：${error.message}`);
            }
        }

        // 执行单行代码
        async function executeLine(line) {
            const playMatch = line.match(/play\s*\(\s*['"]([^'"]+)['"]\s*(?:,\s*(.+))?\s*\)/);
            const comboMatch = line.match(/combo\s*\(\s*['"]([^'"]+)['"]\s*\)/);
            const stopMatch = line.match(/stop\s*\(\s*['"]([^'"]+)['"]\s*\)/);
            const stopAllMatch = line.match(/stopAll\s*\(\s*\)/);

            if (playMatch) {
                const effectId = playMatch[1];
                const paramsStr = playMatch[2];
                const params = paramsStr ? JSON.parse(`{${paramsStr}}`) : {};
                await showcaseEngine.playEffect(effectId, params);
            } else if (comboMatch) {
                const comboId = comboMatch[1];
                await comboGenerator.play(comboId);
            } else if (stopMatch) {
                const effectId = stopMatch[1];
                showcaseEngine.stopEffect(effectId);
            } else if (stopAllMatch) {
                stopAllEffects();
            } else {
                throw new Error(`未知命令：${line}`);
            }
        }

        // 停止所有效果
        function stopAllEffects() {
            showcaseEngine.stopAllEffects();
            if (comboGenerator) {
                comboGenerator.stopAll();
            }
        }

        // 停止所有组合
        function stopAllCombos() {
            if (comboGenerator) {
                comboGenerator.stopAll();
            }
        }

        // 绑定全局事件
        function bindGlobalEvents() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    stopAllEffects();
                }

                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    executeCode();
                }
            });
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
