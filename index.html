<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEM TERMINAL v6.66 [SECURE]</title>
    
    <!-- 核心样式 -->
    <link rel="stylesheet" href="css/main.css">
    <!-- 视觉特效样式 -->
    <link rel="stylesheet" href="css/effects.css">
    <!-- 组件样式 -->
    <link rel="stylesheet" href="css/components/terminal.css">
    
    <!-- 预加载字体 (可选，建议加上以增强专业感) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 开机启动画面 -->
    <div id="boot-sequence" onclick="App.boot()">
        <div class="boot-logo">SECURE CONNECTION ESTABLISHED</div>
        <div class="boot-text">SYSTEM READY</div>
        <div class="boot-text" style="color: var(--blue-color);">CLICK ANYWHERE TO INITIALIZE</div>
        <div class="cursor-blink">_</div>
    </div>

    <!-- 主工作区 -->
    <div id="desktop">
        <!-- 窗口容器，用于放置未来的工具窗口 -->
        <div id="windows-container"></div>
        
        <!-- 主终端窗口 -->
        <div id="terminal-window" class="window active">
            <div class="window-header">
                <span class="title">TERMINAL</span>
                <div class="controls">
                    <span class="minimize">_</span>
                    <span class="maximize">□</span>
                    <span class="close">×</span>
                </div>
            </div>
            <div class="window-body">
                <div id="terminal-output"></div>
                <div id="terminal-input-area">
                    <span class="prompt">root@system:~$</span>
                    <input type="text" id="terminal-input" autofocus autocomplete="off" autocapitalize="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <!-- 全局特效层 (Canvas) -->
    <canvas id="effect-layer"></canvas>

    <!-- 音效 (模拟键盘声) -->
    <audio id="audio-keypress" src="assets/audio/key-press.mp3" preload="auto"></audio>

    <!-- 核心脚本 -->
    <script src="js/data/config.js"></script>
    <script src="js/engine/terminal.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
