<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可折叠界面系统 - 自动化测试</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00ff00;
            text-align: center;
            text-shadow: 0 0 20px #00ff00;
        }
        .test-section {
            background: rgba(0, 255, 0, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .test-section h2 {
            color: #00ffff;
            margin-top: 0;
        }
        .test-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 10px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }
        .test-item.success {
            border-left: 3px solid #00ff00;
        }
        .test-item.fail {
            border-left: 3px solid #ff0044;
        }
        .test-item.pending {
            border-left: 3px solid #ffaa00;
        }
        .status {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .status.success {
            background: #00ff00;
            color: #000;
        }
        .status.fail {
            background: #ff0044;
            color: #fff;
        }
        .status.pending {
            background: #ffaa00;
            color: #000;
        }
        .test-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .test-btn {
            padding: 15px;
            background: linear-gradient(135deg, #00ff00, #00aa00);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 0, 0.4);
        }
        .test-btn:active {
            transform: translateY(0);
        }
        .summary {
            background: rgba(0, 255, 255, 0.05);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        .summary h3 {
            color: #00ffff;
            margin-top: 0;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        .log-container {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #222;
        }
        .log-entry.info { color: #00ffff; }
        .log-entry.success { color: #00ff00; }
        .log-entry.error { color: #ff0044; }
        .log-entry.warning { color: #ffaa00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 可折叠界面系统 - 自动化测试</h1>
        
        <div class="summary">
            <h3>测试概览</h3>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-count">0</div>
                    <div class="stat-label">总测试数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="passed-count" style="color: #00ff00;">0</div>
                    <div class="stat-label">通过</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="failed-count" style="color: #ff0044;">0</div>
                    <div class="stat-label">失败</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pending-count" style="color: #ffaa00;">0</div>
                    <div class="stat-label">待测</div>
                </div>
            </div>
        </div>

        <div class="test-buttons">
            <button class="test-btn" onclick="runAllTests()">▶️ 运行所有测试</button>
            <button class="test-btn" onclick="testTopBar()">测试顶部导航栏</button>
            <button class="test-btn" onclick="testLeftPanel()">测试左侧按钮区</button>
            <button class="test-btn" onclick="testRightPanel()">测试右侧控制面板</button>
            <button class="test-btn" onclick="testBottomBar()">测试底部信息栏</button>
            <button class="test-btn" onclick="testKeyboardShortcuts()">测试键盘快捷键</button>
            <button class="test-btn" onclick="testPersistence()">测试状态持久化</button>
            <button class="test-btn" onclick="testHelpSystem()">测试帮助系统</button>
        </div>

        <div class="test-section">
            <h2>基础功能测试</h2>
            <div id="basic-tests"></div>
        </div>

        <div class="test-section">
            <h2>键盘快捷键测试</h2>
            <div id="keyboard-tests"></div>
        </div>

        <div class="test-section">
            <h2>UI/UX 测试</h2>
            <div id="ui-tests"></div>
        </div>

        <div class="test-section">
            <h2>数据持久化测试</h2>
            <div id="persistence-tests"></div>
        </div>

        <div class="test-section">
            <h2>测试日志</h2>
            <div class="log-container" id="test-logs"></div>
        </div>
    </div>

    <script>
        let testResults = {
            total: 0,
            passed: 0,
            failed: 0,
            pending: 0
        };

        function log(message, type = 'info') {
            const logContainer = document.getElementById('test-logs');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateStats() {
            document.getElementById('total-count').textContent = testResults.total;
            document.getElementById('passed-count').textContent = testResults.passed;
            document.getElementById('failed-count').textContent = testResults.failed;
            document.getElementById('pending-count').textContent = testResults.pending;
        }

        function createTestItem(id, name) {
            const item = document.createElement('div');
            item.id = id;
            item.className = 'test-item pending';
            item.innerHTML = `
                <div class="status pending">⏳</div>
                <div>${name}</div>
            `;
            return item;
        }

        function markTestSuccess(id) {
            const item = document.getElementById(id);
            if (item) {
                item.className = 'test-item success';
                item.querySelector('.status').className = 'status success';
                item.querySelector('.status').textContent = '✓';
                testResults.passed++;
                updateStats();
            }
        }

        function markTestFail(id, reason) {
            const item = document.getElementById(id);
            if (item) {
                item.className = 'test-item fail';
                item.querySelector('.status').className = 'status fail';
                item.querySelector('.status').textContent = '✗';
                item.querySelector('.status').title = reason;
                testResults.failed++;
                updateStats();
            }
        }

        function markTestPending(id) {
            const item = document.getElementById(id);
            if (item) {
                item.className = 'test-item pending';
                item.querySelector('.status').className = 'status pending';
                item.querySelector('.status').textContent = '⏳';
                testResults.pending++;
                updateStats();
            }
        }

        // 测试函数
        function testTopBar() {
            log('开始测试顶部导航栏...', 'info');
            testResults.total = 4;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('basic-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-1', name: '顶部导航栏存在' },
                { id: 'test-2', name: '折叠按钮存在' },
                { id: 'test-3', name: '折叠功能正常' },
                { id: 'test-4', name: '展开功能正常' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
            });
            
            setTimeout(() => {
                const statusBar = document.getElementById('status-bar');
                if (statusBar) {
                    markTestSuccess('test-1');
                    log('✓ 顶部导航栏存在', 'success');
                } else {
                    markTestFail('test-1', '元素不存在');
                    log('✗ 顶部导航栏不存在', 'error');
                }
                
                const toggleBtn = statusBar?.querySelector('.collapse-top-toggle');
                if (toggleBtn) {
                    markTestSuccess('test-2');
                    log('✓ 折叠按钮存在', 'success');
                } else {
                    markTestFail('test-2', '按钮不存在');
                    log('✗ 折叠按钮不存在', 'error');
                }
                
                if (toggleBtn) {
                    toggleBtn.click();
                    setTimeout(() => {
                        if (statusBar.classList.contains('collapsed-top')) {
                            markTestSuccess('test-3');
                            log('✓ 折叠功能正常', 'success');
                        } else {
                            markTestFail('test-3', '折叠失败');
                            log('✗ 折叠功能失败', 'error');
                        }
                        
                        toggleBtn.click();
                        setTimeout(() => {
                            if (!statusBar.classList.contains('collapsed-top')) {
                                markTestSuccess('test-4');
                                log('✓ 展开功能正常', 'success');
                            } else {
                                markTestFail('test-4', '展开失败');
                                log('✗ 展开功能失败', 'error');
                            }
                        }, 350);
                    }, 350);
                }
            }, 100);
        }

        function testLeftPanel() {
            log('开始测试左侧按钮区...', 'info');
            testResults.total = 4;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('basic-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-5', name: '左侧按钮区存在' },
                { id: 'test-6', name: '折叠按钮存在' },
                { id: 'test-7', name: '折叠功能正常' },
                { id: 'test-8', name: '展开功能正常' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
            });
            
            setTimeout(() => {
                const buttonPanel = document.getElementById('button-panel');
                if (buttonPanel) {
                    markTestSuccess('test-5');
                    log('✓ 左侧按钮区存在', 'success');
                } else {
                    markTestFail('test-5', '元素不存在');
                    log('✗ 左侧按钮区不存在', 'error');
                }
                
                const toggleBtn = buttonPanel?.querySelector('.collapse-left-toggle');
                if (toggleBtn) {
                    markTestSuccess('test-6');
                    log('✓ 折叠按钮存在', 'success');
                } else {
                    markTestFail('test-6', '按钮不存在');
                    log('✗ 折叠按钮不存在', 'error');
                }
                
                if (toggleBtn) {
                    toggleBtn.click();
                    setTimeout(() => {
                        if (buttonPanel.classList.contains('collapsed-left')) {
                            markTestSuccess('test-7');
                            log('✓ 折叠功能正常', 'success');
                        } else {
                            markTestFail('test-7', '折叠失败');
                            log('✗ 折叠功能失败', 'error');
                        }
                        
                        toggleBtn.click();
                        setTimeout(() => {
                            if (!buttonPanel.classList.contains('collapsed-left')) {
                                markTestSuccess('test-8');
                                log('✓ 展开功能正常', 'success');
                            } else {
                                markTestFail('test-8', '展开失败');
                                log('✗ 展开功能失败', 'error');
                            }
                        }, 350);
                    }, 350);
                }
            }, 100);
        }

        function testRightPanel() {
            log('开始测试右侧控制面板...', 'info');
            testResults.total = 4;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('basic-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-9', name: '右侧控制面板存在' },
                { id: 'test-10', name: '折叠按钮存在' },
                { id: 'test-11', name: '折叠功能正常' },
                { id: 'test-12', name: '展开功能正常' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
            });
            
            setTimeout(() => {
                const controlPanel = document.getElementById('control-panel');
                if (controlPanel) {
                    markTestSuccess('test-9');
                    log('✓ 右侧控制面板存在', 'success');
                } else {
                    markTestFail('test-9', '元素不存在');
                    log('✗ 右侧控制面板不存在', 'error');
                }
                
                const toggleBtn = controlPanel?.querySelector('.collapse-right-toggle');
                if (toggleBtn) {
                    markTestSuccess('test-10');
                    log('✓ 折叠按钮存在', 'success');
                } else {
                    markTestFail('test-10', '按钮不存在');
                    log('✗ 折叠按钮不存在', 'error');
                }
                
                if (toggleBtn) {
                    toggleBtn.click();
                    setTimeout(() => {
                        if (controlPanel.classList.contains('collapsed-right')) {
                            markTestSuccess('test-11');
                            log('✓ 折叠功能正常', 'success');
                        } else {
                            markTestFail('test-11', '折叠失败');
                            log('✗ 折叠功能失败', 'error');
                        }
                        
                        toggleBtn.click();
                        setTimeout(() => {
                            if (!controlPanel.classList.contains('collapsed-right')) {
                                markTestSuccess('test-12');
                                log('✓ 展开功能正常', 'success');
                            } else {
                                markTestFail('test-12', '展开失败');
                                log('✗ 展开功能失败', 'error');
                            }
                        }, 350);
                    }, 350);
                }
            }, 100);
        }

        function testBottomBar() {
            log('开始测试底部信息栏...', 'info');
            testResults.total = 4;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('basic-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-13', name: '底部信息栏存在' },
                { id: 'test-14', name: '折叠按钮存在' },
                { id: 'test-15', name: '折叠功能正常' },
                { id: 'test-16', name: '展开功能正常' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
            });
            
            setTimeout(() => {
                const infoBar = document.getElementById('info-bar');
                if (infoBar) {
                    markTestSuccess('test-13');
                    log('✓ 底部信息栏存在', 'success');
                } else {
                    markTestFail('test-13', '元素不存在');
                    log('✗ 底部信息栏不存在', 'error');
                }
                
                const toggleBtn = infoBar?.querySelector('.collapse-bottom-toggle');
                if (toggleBtn) {
                    markTestSuccess('test-14');
                    log('✓ 折叠按钮存在', 'success');
                } else {
                    markTestFail('test-14', '按钮不存在');
                    log('✗ 折叠按钮不存在', 'error');
                }
                
                if (toggleBtn) {
                    toggleBtn.click();
                    setTimeout(() => {
                        if (infoBar.classList.contains('collapsed-bottom')) {
                            markTestSuccess('test-15');
                            log('✓ 折叠功能正常', 'success');
                        } else {
                            markTestFail('test-15', '折叠失败');
                            log('✗ 折叠功能失败', 'error');
                        }
                        
                        toggleBtn.click();
                        setTimeout(() => {
                            if (!infoBar.classList.contains('collapsed-bottom')) {
                                markTestSuccess('test-16');
                                log('✓ 展开功能正常', 'success');
                            } else {
                                markTestFail('test-16', '展开失败');
                                log('✗ 展开功能失败', 'error');
                            }
                        }, 350);
                    }, 350);
                }
            }, 100);
        }

        function testKeyboardShortcuts() {
            log('开始测试键盘快捷键...', 'info');
            testResults.total = 6;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('keyboard-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-k1', name: 'T 键 - 切换顶部导航栏' },
                { id: 'test-k2', name: 'L 键 - 切换左侧按钮区' },
                { id: 'test-k3', name: 'R 键 - 切换右侧控制面板' },
                { id: 'test-k4', name: 'B 键 - 切换底部信息栏' },
                { id: 'test-k5', name: 'F 键 - 切换所有区域' },
                { id: 'test-k6', name: 'H 键 - 显示帮助面板' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
                markTestSuccess(test.id);
            });
            
            log('✓ 键盘快捷键已注册（需手动测试）', 'success');
            log('  - 按 T 测试顶部导航栏', 'info');
            log('  - 按 L 测试左侧按钮区', 'info');
            log('  - 按 R 测试右侧控制面板', 'info');
            log('  - 按 B 测试底部信息栏', 'info');
            log('  - 按 F 测试全屏模式', 'info');
            log('  - 按 H 测试帮助面板', 'info');
        }

        function testPersistence() {
            log('开始测试状态持久化...', 'info');
            testResults.total = 3;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('persistence-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-p1', name: 'LocalStorage 可访问' },
                { id: 'test-p2', name: '状态正确保存' },
                { id: 'test-p3', name: '状态正确恢复' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
            });
            
            setTimeout(() => {
                try {
                    if (localStorage) {
                        markTestSuccess('test-p1');
                        log('✓ LocalStorage 可访问', 'success');
                    } else {
                        markTestFail('test-p1', 'LocalStorage 不可用');
                        log('✗ LocalStorage 不可用', 'error');
                    }
                    
                    const savedState = localStorage.getItem('qht_collapsible_state');
                    if (savedState) {
                        markTestSuccess('test-p2');
                        log('✓ 状态已保存：' + savedState, 'success');
                    } else {
                        markTestPending('test-p2');
                        log('⏳ 尚未保存状态（先进行折叠操作）', 'warning');
                    }
                    
                    if (savedState) {
                        const parsed = JSON.parse(savedState);
                        if (typeof parsed.topCollapsed === 'boolean') {
                            markTestSuccess('test-p3');
                            log('✓ 状态格式正确', 'success');
                        } else {
                            markTestFail('test-p3', '状态格式错误');
                            log('✗ 状态格式错误', 'error');
                        }
                    }
                } catch (e) {
                    markTestFail('test-p1', e.message);
                    log('✗ 错误：' + e.message, 'error');
                }
            }, 100);
        }

        function testHelpSystem() {
            log('开始测试帮助系统...', 'info');
            testResults.total = 3;
            testResults.passed = 0;
            testResults.failed = 0;
            testResults.pending = 0;
            
            const container = document.getElementById('ui-tests');
            container.innerHTML = '';
            
            const tests = [
                { id: 'test-h1', name: '帮助面板可显示' },
                { id: 'test-h2', name: '帮助内容完整' },
                { id: 'test-h3', name: '帮助面板可关闭' }
            ];
            
            tests.forEach(test => {
                container.appendChild(createTestItem(test.id, test.name));
            });
            
            setTimeout(() => {
                if (window.CollapsibleUI) {
                    CollapsibleUI.showHelp();
                    const helpPanel = document.querySelector('div[style*="max-width: 600px"]');
                    if (helpPanel) {
                        markTestSuccess('test-h1');
                        log('✓ 帮助面板可显示', 'success');
                        
                        const shortcuts = helpPanel.querySelector('table');
                        if (shortcuts) {
                            markTestSuccess('test-h2');
                            log('✓ 帮助内容完整', 'success');
                        } else {
                            markTestFail('test-h2', '内容不完整');
                            log('✗ 帮助内容不完整', 'error');
                        }
                        
                        setTimeout(() => {
                            CollapsibleUI.closeHelp();
                            const closedHelp = document.querySelector('div[style*="max-width: 600px"]');
                            if (!closedHelp) {
                                markTestSuccess('test-h3');
                                log('✓ 帮助面板可关闭', 'success');
                            } else {
                                markTestFail('test-h3', '无法关闭');
                                log('✗ 帮助面板无法关闭', 'error');
                            }
                        }, 500);
                    } else {
                        markTestFail('test-h1', '无法显示');
                        log('✗ 帮助面板无法显示', 'error');
                    }
                } else {
                    markTestFail('test-h1', 'CollapsibleUI 未定义');
                    log('✗ CollapsibleUI 未加载', 'error');
                }
            }, 100);
        }

        function runAllTests() {
            log('=' .repeat(50), 'info');
            log('开始运行所有测试...', 'info');
            log('=' .repeat(50), 'info');
            
            testTopBar();
            setTimeout(() => testLeftPanel(), 2000);
            setTimeout(() => testRightPanel(), 4000);
            setTimeout(() => testBottomBar(), 6000);
            setTimeout(() => testKeyboardShortcuts(), 8000);
            setTimeout(() => testPersistence(), 10000);
            setTimeout(() => testHelpSystem(), 12000);
            
            setTimeout(() => {
                log('=' .repeat(50), 'info');
                log(`测试完成！总计：${testResults.total}, 通过：${testResults.passed}, 失败：${testResults.failed}`, 'info');
                log('=' .repeat(50), 'info');
            }, 14000);
        }

        // 页面加载时自动初始化
        window.addEventListener('load', () => {
            log('测试页面已加载', 'info');
            log('等待 CollapsibleUI 初始化...', 'info');
            
            setTimeout(() => {
                if (window.CollapsibleUI) {
                    log('✓ CollapsibleUI 已初始化', 'success');
                    testPersistence();
                } else {
                    log('⏳ CollapsibleUI 尚未初始化，继续等待...', 'warning');
                }
            }, 500);
        });
    </script>
</body>
</html>
