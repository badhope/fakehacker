<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>效果展示平台 - Effect Showcase Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.5), transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        /* 头部 */
        .header {
            background: linear-gradient(180deg, rgba(0, 255, 255, 0.1), transparent);
            border-bottom: 2px solid #00ffff;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8),
                         0 0 40px rgba(0, 255, 255, 0.4);
            letter-spacing: 5px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(0, 255, 255, 0.8); }
            to { text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 60px rgba(0, 255, 255, 0.6); }
        }

        .header p {
            color: #00ff00;
            font-size: 18px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* 主容器 */
        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 统计栏 */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(0, 255, 255, 0.05));
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(0, 255, 255, 0.4);
        }

        .stat-number {
            font-size: 64px;
            color: #00ffff;
            font-weight: bold;
            display: block;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        .stat-label {
            color: #00ff00;
            font-size: 18px;
            margin-top: 10px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* 控制区 */
        .control-section {
            background: rgba(10, 10, 30, 0.8);
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .control-title {
            color: #00ffff;
            font-size: 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .effect-btn {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 255, 0.05));
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .effect-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .effect-btn:hover::before {
            left: 100%;
        }

        .effect-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.5);
            background: rgba(0, 255, 255, 0.3);
        }

        .effect-btn:active {
            transform: scale(0.95);
        }

        .btn-icon {
            font-size: 32px;
        }

        /* 组合按钮区 */
        .combo-section {
            background: rgba(20, 20, 50, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .combo-title {
            color: #ff00ff;
            font-size: 28px;
            margin-bottom: 20px;
        }

        .combo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .combo-card {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.15), rgba(255, 0, 255, 0.05));
            border: 2px solid #ff00ff;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .combo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
        }

        .combo-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(255, 0, 255, 0.5);
        }

        .combo-card h3 {
            color: #ff00ff;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .combo-card p {
            color: #cccccc;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .combo-meta {
            display: flex;
            justify-content: space-between;
            color: #888888;
            font-size: 12px;
        }

        /* 代码输入区 */
        .code-input-section {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 600px;
            max-width: calc(100vw - 40px);
            background: rgba(10, 10, 30, 0.95);
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            z-index: 9500;
        }

        .code-input-title {
            color: #00ff00;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-editor {
            width: 100%;
            min-height: 200px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ff00;
            border-radius: 4px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            resize: vertical;
            outline: none;
            line-height: 1.5;
        }

        .code-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-execute {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
        }

        .btn-execute:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .btn-clear {
            background: #ff4444;
            color: #fff;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid #00ffff;
            margin-top: 60px;
        }

        .footer p {
            color: #888888;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .stat-number {
                font-size: 48px;
            }

            .button-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }

        /* 效果 Canvas */
        #effect-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation">
        <div class="grid-lines"></div>
        <div class="scan-line"></div>
    </div>

    <!-- 效果 Canvas -->
    <canvas id="effect-canvas"></canvas>

    <!-- 头部 -->
    <div class="header">
        <h1>⚡ EFFECT SHOWCASE ⚡</h1>
        <p>交互式视觉效果展示平台</p>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-card">
                <span class="stat-number" id="total-effects">0</span>
                <span class="stat-label">总效果数</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="total-combos">0</span>
                <span class="stat-label">效果组合</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="active-effects">0</span>
                <span class="stat-label">活跃效果</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="fps-counter">60</span>
                <span class="stat-label">FPS</span>
            </div>
        </div>

        <!-- 单个效果按钮区 -->
        <div class="control-section">
            <h2 class="control-title">🎨 单个效果</h2>
            <div class="button-grid" id="effects-grid">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 效果组合区 -->
        <div class="combo-section">
            <h2 class="combo-title">🔥 效果组合</h2>
            <div class="combo-grid" id="combos-grid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 代码输入区 -->
    <div class="code-input-section" id="code-input">
        <div class="code-input-title">
            <span>💻 代码控制台</span>
            <span style="font-size: 12px; color: #888;">Ctrl+Enter 执行</span>
        </div>
        <textarea class="code-editor" id="code-editor" placeholder="// 输入代码指令&#10;// 示例：&#10;// play('matrix_rain')&#10;// combo('cyber_attack')&#10;// stopAll()"></textarea>
        <div class="code-actions">
            <button class="action-btn btn-clear" onclick="clearCode()">清空</button>
            <button class="action-btn btn-execute" onclick="executeCode()">▶ 执行</button>
        </div>
    </div>

    <!-- 页脚 -->
    <div class="footer">
        <p>Effect Showcase Platform v1.0 | Powered by ShowcaseEngine</p>
        <p style="margin-top: 10px; font-size: 12px;">按 ESC 停止所有效果</p>
    </div>

    <!-- 脚本加载 -->
    <script src="js/core/EventBus.js"></script>
    <script src="js/showcase/ShowcaseEngine.js"></script>
    <script src="js/showcase/EffectRegistry.js"></script>
    <script src="js/showcase/ComboGenerator.js"></script>
    <script src="js/showcase/ButtonSystem.js"></script>
    <script src="js/showcase/CodeInput.js"></script>
    <script src="js/showcase/ShowcaseApp.js"></script>

    <script>
        // 全局应用实例
        let app = null;
        let comboGenerator = null;
        let buttonSystem = null;

        // 初始化应用
        async function initApp() {
            console.log('🚀 初始化展示平台...');

            try {
                // 初始化展示引擎
                const engine = new ShowcaseEngine();
                await engine.init();
                window.showcaseEngine = engine;

                // 初始化效果注册表
                const registry = new EffectRegistry(engine);
                registry.registerAllEffects();

                // 初始化组合生成器
                comboGenerator = new ComboGenerator();
                comboGenerator.init(engine);
                window.comboGenerator = comboGenerator;

                // 初始化按钮系统
                buttonSystem = new ButtonSystem();
                await buttonSystem.init(document.getElementById('effects-grid'));
                registerEffectButtons();

                // 渲染组合卡片
                renderComboCards();

                // 更新统计
                updateStats();
                setInterval(updateStats, 1000);

                // 绑定全局事件
                bindGlobalEvents();

                app = { engine, registry, comboGenerator, buttonSystem };
                window.app = app;

                console.log('✅ 展示平台初始化完成');
            } catch (error) {
                console.error('❌ 初始化失败:', error);
                alert('初始化失败：' + error.message);
            }
        }

        // 注册效果按钮
        function registerEffectButtons() {
            const effects = showcaseEngine.getAllEffects();
            const icons = {
                matrix: '🌧',
                network: '🕸',
                particle: '💥',
                glitch: '⚡',
                overlay: '📺',
                flash: '✨',
                text: '📝',
                code: '💻',
                wave: '🌊',
                pulse: '💓',
                ripple: '💧',
                distortion: '🌀'
            };

            for (const effect of effects) {
                const icon = icons[effect.category] || '⚡';
                buttonSystem.addButton(effect.id, {
                    label: effect.name,
                    icon: icon,
                    color: getCategoryColor(effect.category),
                    group: effect.category,
                    effects: [{ id: effect.id, params: effect.defaultParams }],
                    description: effect.description
                });
            }
        }

        // 获取分类颜色
        function getCategoryColor(category) {
            const colors = {
                matrix: '#00ff00',
                network: '#00ffff',
                particle: '#ff8800',
                glitch: '#ff00ff',
                overlay: '#ffffff',
                flash: '#ffff00',
                text: '#0088ff',
                code: '#00ff88',
                wave: '#ff0088',
                pulse: '#ff0055',
                ripple: '#00ffff',
                distortion: '#aa00ff'
            };
            return colors[category] || '#00ffff';
        }

        // 渲染组合卡片
        function renderComboCards() {
            const grid = document.getElementById('combos-grid');
            const combos = comboGenerator.getAllCombos();

            grid.innerHTML = '';

            for (const combo of combos) {
                const card = document.createElement('div');
                card.className = 'combo-card';
                card.onclick = () => playCombo(combo.id);

                card.innerHTML = `
                    <h3>${combo.name}</h3>
                    <p>${combo.description}</p>
                    <div class="combo-meta">
                        <span>⏱ ${(combo.duration / 1000).toFixed(1)}s</span>
                        <span>🔢 ${combo.steps.length} 步骤</span>
                        <span>▶ 播放</span>
                    </div>
                `;

                grid.appendChild(card);
            }
        }

        // 更新统计
        function updateStats() {
            if (!showcaseEngine) return;

            const stats = showcaseEngine.getStats();
            const comboStats = comboGenerator ? comboGenerator.getStats() : { totalCombos: 0 };

            document.getElementById('total-effects').textContent = stats.totalEffects;
            document.getElementById('total-combos').textContent = comboStats.totalCombos;
            document.getElementById('active-effects').textContent = stats.activeEffects;
        }

        // 播放效果
        async function playEffect(effectId) {
            try {
                await showcaseEngine.playEffect(effectId);
            } catch (error) {
                console.error('播放失败:', error);
                alert(`播放效果失败：${error.message}`);
            }
        }

        // 播放组合
        async function playCombo(comboId) {
            try {
                await comboGenerator.play(comboId);
            } catch (error) {
                console.error('播放组合失败:', error);
                alert(`播放组合失败：${error.message}`);
            }
        }

        // 清空代码
        function clearCode() {
            document.getElementById('code-editor').value = '';
            document.getElementById('code-editor').focus();
        }

        // 执行代码
        async function executeCode() {
            const code = document.getElementById('code-editor').value.trim();
            if (!code) return;

            try {
                const lines = code.split('\n').filter(line => line.trim() && !line.trim().startsWith('//'));
                
                for (const line of lines) {
                    await executeLine(line.trim());
                }
            } catch (error) {
                console.error('执行失败:', error);
                alert(`执行失败：${error.message}`);
            }
        }

        // 执行单行代码
        async function executeLine(line) {
            const playMatch = line.match(/play\s*\(\s*['"]([^'"]+)['"]\s*(?:,\s*(.+))?\s*\)/);
            const comboMatch = line.match(/combo\s*\(\s*['"]([^'"]+)['"]\s*\)/);
            const stopMatch = line.match(/stop\s*\(\s*['"]([^'"]+)['"]\s*\)/);
            const stopAllMatch = line.match(/stopAll\s*\(\s*\)/);

            if (playMatch) {
                const effectId = playMatch[1];
                const paramsStr = playMatch[2];
                const params = paramsStr ? JSON.parse(`{${paramsStr}}`) : {};
                await showcaseEngine.playEffect(effectId, params);
            } else if (comboMatch) {
                const comboId = comboMatch[1];
                await comboGenerator.play(comboId);
            } else if (stopMatch) {
                const effectId = stopMatch[1];
                showcaseEngine.stopEffect(effectId);
            } else if (stopAllMatch) {
                showcaseEngine.stopAllEffects();
                comboGenerator.stopAll();
            } else {
                throw new Error(`未知命令：${line}`);
            }
        }

        // 绑定全局事件
        function bindGlobalEvents() {
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    showcaseEngine.stopAllEffects();
                    if (comboGenerator) {
                        comboGenerator.stopAll();
                    }
                }

                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    executeCode();
                }
            });
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
