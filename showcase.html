<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>效果展示平台 - Effect Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.1), rgba(255, 0, 255, 0.1));
            border-bottom: 2px solid #00ffff;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            animation: scan 3s infinite;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .header h1 {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            color: #00ff00;
            font-size: 18px;
            position: relative;
            z-index: 1;
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 8px;
            padding: 20px 40px;
            text-align: center;
            min-width: 200px;
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.3);
        }

        .stat-number {
            font-size: 48px;
            color: #00ffff;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            color: #00ff00;
            font-size: 16px;
            margin-top: 5px;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #ff00ff, #ff0055);
            color: #fff;
        }

        .btn-secondary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }

        .effects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .effect-card {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.9), rgba(40, 40, 80, 0.9));
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .effect-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #00ff00, #00ffff);
        }

        .effect-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.4);
        }

        .effect-card h3 {
            color: #00ffff;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .effect-card p {
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .effect-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            background: rgba(0, 255, 255, 0.2);
            color: #00ffff;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid rgba(0, 255, 255, 0.5);
        }

        .effect-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #888888;
            font-size: 14px;
        }

        .play-btn {
            background: linear-gradient(45deg, #00ff00, #00ffff);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .footer {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 2px solid #00ffff;
            margin-top: 60px;
        }

        .footer p {
            color: #888888;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto 40px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ffff;
            border-radius: 30px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .category-filter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            color: #00ffff;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-btn.active,
        .category-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ 效果展示平台</h1>
        <p>Effect Showcase Platform - 探索视觉特效的无限可能</p>
    </div>

    <div class="main-content">
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="total-effects">0</span>
                <span class="stat-label">总效果数</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="total-categories">0</span>
                <span class="stat-label">效果分类</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="active-effects">0</span>
                <span class="stat-label">活跃效果</span>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="🔍 搜索效果...">
        </div>

        <div class="category-filter" id="category-filter">
            <!-- 动态生成分类按钮 -->
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="app.openShowcase()">
                🎨 打开展示台
            </button>
            <button class="btn btn-secondary" onclick="app.stopAllEffects()">
                ⏹ 停止所有效果
            </button>
        </div>

        <div class="effects-grid" id="effects-grid">
            <!-- 动态生成效果卡片 -->
        </div>
    </div>

    <div class="footer">
        <p>效果展示平台 v1.0 | Powered by ShowcaseEngine</p>
    </div>

    <script src="../core/EventBus.js"></script>
    <script src="ShowcaseEngine.js"></script>
    <script src="EffectRegistry.js"></script>
    <script src="ShowcaseUI.js"></script>
    <script src="ShowcaseApp.js"></script>

    <script>
        let app = null;

        async function initApp() {
            console.log('初始化应用...');
            
            app = new ShowcaseApp();
            await app.init();

            updateStats();
            renderEffects();
            renderCategories();
            bindEvents();

            window.app = app;
            console.log('应用初始化完成');
        }

        function updateStats() {
            const stats = app.getStats();
            document.getElementById('total-effects').textContent = stats.totalEffects;
            document.getElementById('total-categories').textContent = stats.categories.length;
            document.getElementById('active-effects').textContent = stats.activeEffects;
        }

        function renderEffects() {
            const grid = document.getElementById('effects-grid');
            const effects = app.engine.getAllEffects();

            grid.innerHTML = '';

            for (const effect of effects) {
                const card = createEffectCard(effect);
                grid.appendChild(card);
            }
        }

        function createEffectCard(effect) {
            const card = document.createElement('div');
            card.className = 'effect-card';
            card.onclick = () => playEffect(effect.id);

            const categoryColors = {
                matrix: '#00ff00',
                network: '#00ffff',
                particle: '#ff8800',
                glitch: '#ff00ff',
                overlay: '#ffffff',
                flash: '#ffff00',
                text: '#0088ff',
                code: '#00ff88',
                wave: '#ff0088',
                pulse: '#ff0055',
                ripple: '#00ffff',
                distortion: '#aa00ff'
            };

            const color = categoryColors[effect.category] || '#00ffff';

            card.innerHTML = `
                <h3 style="color: ${color};">${effect.name}</h3>
                <p>${effect.description}</p>
                <div class="effect-tags">
                    ${effect.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                <div class="effect-meta">
                    <span>⏱ ${effect.duration / 1000}s</span>
                    <button class="play-btn">▶ 播放</button>
                </div>
            `;

            return card;
        }

        function renderCategories() {
            const filter = document.getElementById('category-filter');
            const categories = app.engine.getCategories();
            const categoryNames = {
                matrix: '矩阵',
                network: '网络',
                particle: '粒子',
                glitch: '故障',
                overlay: '覆盖',
                flash: '闪烁',
                text: '文本',
                code: '代码',
                wave: '波浪',
                pulse: '脉冲',
                ripple: '涟漪',
                distortion: '扭曲'
            };

            filter.innerHTML = `
                <button class="category-btn active" data-category="all">全部</button>
                ${categories.map(cat => `
                    <button class="category-btn" data-category="${cat}">
                        ${categoryNames[cat] || cat}
                    </button>
                `).join('')}
            `;

            filter.onclick = (e) => {
                if (e.target.classList.contains('category-btn')) {
                    document.querySelectorAll('.category-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    
                    const category = e.target.dataset.category;
                    filterEffects(category);
                }
            };
        }

        function filterEffects(category) {
            const grid = document.getElementById('effects-grid');
            const effects = category === 'all' 
                ? app.engine.getAllEffects()
                : app.engine.getEffectsByCategory(category);

            grid.innerHTML = '';
            for (const effect of effects) {
                const card = createEffectCard(effect);
                grid.appendChild(card);
            }
        }

        function bindEvents() {
            const searchInput = document.getElementById('search-input');
            searchInput.oninput = (e) => {
                const query = e.target.value;
                if (query.length < 2) {
                    renderEffects();
                    return;
                }
                
                const results = app.search(query);
                const grid = document.getElementById('effects-grid');
                grid.innerHTML = '';
                
                for (const effect of results) {
                    const card = createEffectCard(effect);
                    grid.appendChild(card);
                }
            };

            setInterval(updateStats, 1000);
        }

        async function playEffect(effectId) {
            try {
                await app.play(effectId);
            } catch (error) {
                console.error('播放失败:', error);
                alert(`播放效果失败：${error.message}`);
            }
        }

        app.openShowcase = function() {
            if (app.ui) {
                app.ui.renderEffectCards(app.engine.getAllEffects());
            }
        };

        app.stopAllEffects = function() {
            if (app.engine) {
                app.engine.stopAllEffects();
                updateStats();
            }
        };

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
