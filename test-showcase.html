<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>效果展示平台 - 快速测试</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #00ff00;
            border-radius: 8px;
        }
        .test-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }
        .test-btn:hover {
            background: #00ffff;
        }
        #log {
            background: rgba(0, 255, 0, 0.1);
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        .info { color: #00ffff; }
    </style>
</head>
<body>
    <h1>🧪 效果展示平台 - 快速测试</h1>
    
    <div class="test-section">
        <h2>1. 核心引擎测试</h2>
        <button class="test-btn" onclick="testEngine()">测试引擎初始化</button>
        <button class="test-btn" onclick="testEffectRegistration()">测试效果注册</button>
        <button class="test-btn" onclick="testComboRegistration()">测试组合注册</button>
    </div>

    <div class="test-section">
        <h2>2. 单个效果测试</h2>
        <button class="test-btn" onclick="testMatrix()">矩阵雨</button>
        <button class="test-btn" onclick="testParticle()">粒子爆炸</button>
        <button class="test-btn" onclick="testNetwork()">网络拓扑</button>
        <button class="test-btn" onclick="testGlitch()">故障效果</button>
        <button class="test-btn" onclick="testWave()">波浪效果</button>
    </div>

    <div class="test-section">
        <h2>3. 组合效果测试</h2>
        <button class="test-btn" onclick="testCyberAttack()">赛博攻击</button>
        <button class="test-btn" onclick="testSystemBoot()">系统启动</button>
        <button class="test-btn" onclick="testMatrixDance()">矩阵之舞</button>
        <button class="test-btn" onclick="testParticleSymphony()">粒子交响曲</button>
    </div>

    <div class="test-section">
        <h2>4. 控制测试</h2>
        <button class="test-btn" onclick="testStopAll()">停止所有效果</button>
        <button class="test-btn" onclick="testStats()">查看统计</button>
        <button class="test-btn" onclick="clearLog()">清空日志</button>
    </div>

    <div class="test-section">
        <h2>测试日志</h2>
        <div id="log"></div>
    </div>

    <script src="js/core/EventBus.js"></script>
    <script src="js/showcase/ShowcaseEngine.js"></script>
    <script src="js/showcase/EffectRegistry.js"></script>
    <script src="js/showcase/ComboGenerator.js"></script>

    <script>
        let engine = null;
        let comboGenerator = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `[${time}] ${message}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function initTest() {
            try {
                log('正在初始化引擎...', 'info');
                engine = new ShowcaseEngine();
                await engine.init();
                window.showcaseEngine = engine;
                log('✓ 引擎初始化成功', 'success');

                log('正在注册效果...', 'info');
                const registry = new EffectRegistry(engine);
                registry.registerAllEffects();
                log(`✓ 效果注册成功 (${engine.getAllEffects().length} 个效果)`, 'success');

                log('正在注册组合...', 'info');
                comboGenerator = new ComboGenerator();
                comboGenerator.init(engine);
                log(`✓ 组合注册成功 (${comboGenerator.getAllCombos().length} 个组合)`, 'success');

                log('=================================', 'info');
            } catch (error) {
                log(`✗ 初始化失败：${error.message}`, 'error');
                console.error(error);
            }
        }

        async function testEngine() {
            if (!engine) {
                log('引擎未初始化', 'error');
                return;
            }
            const stats = engine.getStats();
            log(`引擎状态 - 效果：${stats.totalEffects}, 活跃：${stats.activeEffects}, 分类：${stats.categories.length}`, 'info');
        }

        function testEffectRegistration() {
            const effects = engine.getAllEffects();
            log(`已注册效果：${effects.map(e => e.name).join(', ')}`, 'info');
        }

        function testComboRegistration() {
            const combos = comboGenerator.getAllCombos();
            log(`已注册组合：${combos.map(c => c.name).join(', ')}`, 'info');
        }

        async function testMatrix() {
            try {
                log('播放矩阵雨...', 'info');
                await engine.playEffect('matrix_rain', { color: '#00ff00', speed: 40 });
                log('✓ 矩阵雨播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testParticle() {
            try {
                log('播放粒子爆炸...', 'info');
                await engine.playEffect('particle_explosion', { particleCount: 150 });
                log('✓ 粒子爆炸播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testNetwork() {
            try {
                log('播放网络拓扑...', 'info');
                await engine.playEffect('network_topology', { nodeCount: 80 });
                log('✓ 网络拓扑播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testGlitch() {
            try {
                log('播放故障效果...', 'info');
                await engine.playEffect('glitch', { intensity: 30, duration: 2000 });
                log('✓ 故障效果播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testWave() {
            try {
                log('播放波浪效果...', 'info');
                await engine.playEffect('wave', { color: '#ff00ff', amplitude: 80 });
                log('✓ 波浪效果播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testCyberAttack() {
            try {
                log('播放组合：赛博攻击...', 'info');
                await comboGenerator.play('cyber_attack');
                log('✓ 赛博攻击播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testSystemBoot() {
            try {
                log('播放组合：系统启动...', 'info');
                await comboGenerator.play('system_boot');
                log('✓ 系统启动播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testMatrixDance() {
            try {
                log('播放组合：矩阵之舞...', 'info');
                await comboGenerator.play('matrix_dance');
                log('✓ 矩阵之舞播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        async function testParticleSymphony() {
            try {
                log('播放组合：粒子交响曲...', 'info');
                await comboGenerator.play('particle_symphony');
                log('✓ 粒子交响曲播放成功', 'success');
            } catch (error) {
                log(`✗ 失败：${error.message}`, 'error');
            }
        }

        function testStopAll() {
            log('停止所有效果...', 'info');
            engine.stopAllEffects();
            comboGenerator.stopAll();
            log('✓ 所有效果已停止', 'success');
        }

        function testStats() {
            const engineStats = engine.getStats();
            const comboStats = comboGenerator.getStats();
            log(`统计信息 - 效果：${engineStats.totalEffects}, 活跃：${engineStats.activeEffects}, 组合：${comboStats.totalCombos}, 分类：${engineStats.categories.length}`, 'info');
        }

        // 页面加载时自动初始化
        window.addEventListener('DOMContentLoaded', initTest);
    </script>
</body>
</html>
