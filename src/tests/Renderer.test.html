<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renderer.js 单元测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }
        
        #test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #test-status {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #888;
        }
        
        #test-results {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .test-suite {
            margin-bottom: 20px;
        }
        
        .test-suite-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        
        .test-case {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .test-case.passed {
            background: rgba(0, 255, 0, 0.1);
            border-left: 3px solid #00ff00;
        }
        
        .test-case.failed {
            background: rgba(255, 0, 0, 0.1);
            border-left: 3px solid #ff0000;
        }
        
        .test-case-name {
            flex: 1;
        }
        
        .test-case-duration {
            color: #888;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .test-case-status {
            font-weight: bold;
            min-width: 60px;
            text-align: right;
        }
        
        .test-case-status.passed {
            color: #00ff00;
        }
        
        .test-case-status.failed {
            color: #ff0000;
        }
        
        .test-error {
            font-size: 12px;
            color: #ff6666;
            margin-top: 5px;
            padding-left: 20px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        #summary {
            background: #1a1a1a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .summary-stat {
            display: inline-block;
            margin: 0 20px;
        }
        
        .summary-stat-value {
            font-size: 36px;
            font-weight: bold;
            display: block;
        }
        
        .summary-stat-label {
            font-size: 14px;
            color: #888;
        }
        
        .passed-count { color: #00ff00; }
        .failed-count { color: #ff0000; }
        .total-count { color: #00ffff; }
        
        #run-btn {
            display: block;
            margin: 20px auto;
            padding: 12px 40px;
            background: linear-gradient(135deg, #00ff00, #00aa00);
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #run-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        #effect-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <canvas id="effect-canvas"></canvas>
    
    <div id="test-container">
        <h1>🧪 Renderer.js 单元测试</h1>
        <div id="test-status">准备运行测试...</div>
        
        <button id="run-btn" onclick="runTests()">▶️ 运行测试</button>
        
        <div id="test-results"></div>
        
        <div id="summary" style="display: none;">
            <div class="summary-stat">
                <span class="summary-stat-value passed-count" id="passed-count">0</span>
                <span class="summary-stat-label">✅ 通过</span>
            </div>
            <div class="summary-stat">
                <span class="summary-stat-value failed-count" id="failed-count">0</span>
                <span class="summary-stat-label">❌ 失败</span>
            </div>
            <div class="summary-stat">
                <span class="summary-stat-value total-count" id="total-count">0</span>
                <span class="summary-stat-label">📊 总计</span>
            </div>
            <div class="summary-stat">
                <span class="summary-stat-value" id="pass-rate">0%</span>
                <span class="summary-stat-label">📈 通过率</span>
            </div>
        </div>
    </div>
    
    <script src="../core/EventBus.js"></script>
    <script src="../core/ConfigManager.js"></script>
    <script src="../infrastructure/Renderer.js"></script>
    <script src="Renderer.test.js"></script>
    
    <script>
        async function runTests() {
            const runBtn = document.getElementById('run-btn');
            const statusDiv = document.getElementById('test-status');
            const resultsDiv = document.getElementById('test-results');
            const summaryDiv = document.getElementById('summary');
            
            runBtn.disabled = true;
            runBtn.style.opacity = '0.5';
            statusDiv.textContent = '🔄 正在运行测试...';
            resultsDiv.innerHTML = '';
            summaryDiv.style.display = 'none';
            
            await new Promise(resolve => setTimeout(resolve, 100));
            
            try {
                const results = await window.RendererTests.runAllTests();
                
                statusDiv.textContent = results ? '✅ 测试完成' : '⚠️ 部分测试失败';
                
                displayResults();
                summaryDiv.style.display = 'block';
            } catch (error) {
                statusDiv.textContent = '❌ 测试运行出错：' + error.message;
                console.error(error);
            } finally {
                runBtn.disabled = false;
                runBtn.style.opacity = '1';
            }
        }
        
        function displayResults() {
            const resultsDiv = document.getElementById('test-results');
            const suites = window.RendererTests.TestSuite;
            
            resultsDiv.innerHTML = `
                <div class="test-suite fade-in">
                    <div class="test-suite-title">Renderer 核心功能测试</div>
                    <div id="test-cases"></div>
                </div>
            `;
            
            const testCasesDiv = document.getElementById('test-cases');
            
            window.RendererTests.TestSuite.prototype.tests.forEach(test => {
                const caseDiv = document.createElement('div');
                caseDiv.className = `test-case ${test.passed ? 'passed' : 'failed'} fade-in`;
                
                caseDiv.innerHTML = `
                    <div class="test-case-name">${test.name}</div>
                    <div class="test-case-duration">${test.duration.toFixed(2)}ms</div>
                    <div class="test-case-status ${test.passed ? 'passed' : 'failed'}">
                        ${test.passed ? '✅ 通过' : '❌ 失败'}
                    </div>
                `;
                
                if (!test.passed && test.error) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'test-error';
                    errorDiv.textContent = `错误：${test.error.message}\n\n${test.error.stack}`;
                    caseDiv.appendChild(errorDiv);
                }
                
                testCasesDiv.appendChild(caseDiv);
            });
        }
        
        window.addEventListener('load', () => {
            console.log('测试页面已加载，点击"运行测试"按钮开始测试');
        });
    </script>
</body>
</html>
